{{define "content"}}
<div class="auth-wrap">
    <div class="card">
        <h2>{{t .Lang "auth.register_title"}}</h2>
        {{if .Error}}
        <p class="error">{{.Error}}</p>
        {{end}}
        <form method="POST" action="/registrieren">
            <label for="username">{{t .Lang "auth.username"}}</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="display_name">{{t .Lang "auth.display_name"}}</label>
            <input type="text" id="display_name" name="display_name" placeholder="Optional">

            <label for="password">{{t .Lang "auth.password"}}</label>
            <input type="password" id="password" name="password" required minlength="6">

            <label for="password2">Passwort wiederholen</label>
            <input type="password" id="password2" name="password2" required minlength="6">

            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem">{{t .Lang "auth.register"}}</button>
        </form>
        <p class="auth-link">{{t .Lang "auth.has_account"}} <a href="/anmelden">{{t .Lang "auth.login"}}</a></p>
    </div>
</div>
{{end}}
