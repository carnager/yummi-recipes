{{define "content"}}
<div class="page-header">
    <h2>{{if .PageTitle}}{{.PageTitle}}{{else}}{{t .Lang "nav.recipes"}}{{end}}</h2>
    {{if .User}}<a href="/rezepte/neu" class="btn btn-primary">+ {{t .Lang "recipe.new"}}</a>{{end}}
</div>

<div class="search-bar">
    <input type="search"
           name="q"
           placeholder="{{t .Lang "search.placeholder"}}"
           hx-get="/suche"
           hx-trigger="input changed delay:300ms, search"
           hx-target="#recipe-grid"
           hx-params="q">
</div>

<div id="recipe-grid" class="grid-recipes">
    {{if .Recipes}}
        {{range .Recipes}}
        {{template "recipe_card" .}}
        {{end}}
    {{else}}
        <p class="empty-state">{{t .Lang "recipe.none_yet"}}</p>
    {{end}}
</div>
{{end}}
