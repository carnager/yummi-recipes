{{define "content"}}
<div class="import-wrap">
    <div class="card">
        <h2>Rezept importieren</h2>
        {{if .Error}}
        <p class="error">{{.Error}}</p>
        {{end}}
        <form method="POST" action="/rezepte/neu/import">
            <label for="url">Rezept-URL</label>
            <input type="url" id="url" name="url" placeholder="https://www.chefkoch.de/rezepte/..." required autofocus>
            <small>Unterstuetzt Webseiten mit Schema.org Rezept-Markup (die meisten Koch-Blogs).</small>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Importieren</button>
                <a href="/rezepte/neu" class="btn btn-outline">Zurueck</a>
            </div>
        </form>
    </div>
</div>
{{end}}
