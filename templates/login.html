{{define "content"}}
<div class="auth-wrap">
    <div class="card">
        <h2>Anmelden</h2>
        {{if .Error}}
        <p class="error">{{.Error}}</p>
        {{end}}
        <form method="POST" action="/anmelden">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem">Anmelden</button>
        </form>
        <p class="auth-link">Noch kein Konto? <a href="/registrieren">Registrieren</a></p>
    </div>
</div>
{{end}}
