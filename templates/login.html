{{define "content"}}
<div class="auth-wrap">
    <div class="card">
        <h2>{{t .Lang "auth.login_title"}}</h2>
        {{if .Error}}
        <p class="error">{{.Error}}</p>
        {{end}}
        <form method="POST" action="/anmelden">
            <label for="username">{{t .Lang "auth.username"}}</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="password">{{t .Lang "auth.password"}}</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem">{{t .Lang "auth.login"}}</button>
        </form>
        <p class="auth-link">{{t .Lang "auth.no_account"}} <a href="/registrieren">{{t .Lang "auth.register"}}</a></p>
    </div>
</div>
{{end}}
